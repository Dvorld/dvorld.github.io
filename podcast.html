<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Podcast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 0;
    }

    .header {
      padding: 40px;
      text-align: center;
      background: #1a1a1a;
    }

    .header h1 {
      margin: 0;
      font-size: 36px;
    }

    .header p {
      color: #aaa;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
    }

    a.button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #ff3b3b;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    a.button:hover {
      background: #ff1f1f;
    }

    .footer {
      text-align: center;
      padding: 30px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>🎙 My Podcast</h1>
    <p>Stories, ideas, and conversations</p>
  </div>

  <div class="container">

    <div class="card">
      <h2>Subscribe</h2>
      <p>Listen on your favorite podcast app using RSS.</p>

      <a class="button" href="https://YOURUSERNAME.github.io/podcast.xml">
        Open RSS Feed
      </a>
    </div>

    <div class="card">
      <h2>Latest Episode</h2>
      <p>Episode updates will appear via podcast apps.</p>
    </div>

    <div class="card">
      <h2>About</h2>
      <p>
        This podcast is hosted using GitHub Pages and audio files from Internet Archive.
      </p>
    </div>

  </div>

  <div class="footer">
    Built with GitHub Pages
  </div>

</body>
</html>
